services:
  postgres:
    image: postgres:15-alpine
    container_name: xcavate-postgres
    env_file: 
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xcavate_profile}
      POSTGRES_USER: ${POSTGRES_USER:-xcavate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xcavate_user} -d ${POSTGRES_DB:-xcavate_profile}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xcavate-api
    env_file: 
      - .env
    ports:
      - "${ASPNETCORE_PORT:-5000}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=Host=${POSTGRES_HOST:-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:-xcavate_profile};Username=${POSTGRES_USER:-xcavate_user};Password=${POSTGRES_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://fsn1.your-storagebox.de}
      - S3_REGION=${S3_REGION:-fsn1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - ADMIN_ADDRESSES=${ADMIN_ADDRESSES}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: